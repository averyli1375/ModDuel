<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Wood texturing -->
    <pattern id="wood-planks" patternUnits="userSpaceOnUse" width="40" height="20">
      <rect width="40" height="20" fill="#a67b5b"/>
      <line x1="0" y1="20" x2="40" y2="20" stroke="#5c4033" stroke-width="2"/>
      <line x1="10" y1="0" x2="10" y2="20" stroke="#5c4033" stroke-width="1" opacity="0.4"/>
      <line x1="30" y1="0" x2="30" y2="20" stroke="#5c4033" stroke-width="1" opacity="0.4"/>
    </pattern>
    <pattern id="wood-dark" patternUnits="userSpaceOnUse" width="30" height="15">
      <rect width="30" height="15" fill="#6b4c3a"/>
      <line x1="0" y1="15" x2="30" y2="15" stroke="#3e2a1d" stroke-width="2"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Blacksmith building (background right) -->
  <rect x="350" y="250" width="200" height="350" fill="url(#wood-planks)"/>
  <polygon points="330,250 450,150 570,250" fill="#8c3a3a" />
  <rect x="390" y="190" width="120" height="30" fill="#e8d5b7" stroke="#3e2a1d" stroke-width="3"/>
  <text x="450" y="212" font-family="serif" font-weight="bold" font-size="18" text-anchor="middle" fill="#3e2a1d">BLACKSMITH</text>
  <rect x="380" y="320" width="60" height="80" fill="#3e2a1d"/>
  <rect x="470" y="320" width="50" height="60" fill="#ffd700" opacity="0.8" filter="url(#glow)"/>
  <rect x="470" y="320" width="50" height="60" fill="none" stroke="#3e2a1d" stroke-width="4"/>

  <!-- Main General Store Building -->
  <!-- False Front roof -->
  <path d="M 50,200 L 50,50 L 350,50 L 350,200 Z" fill="url(#wood-dark)"/>
  <rect x="30" y="30" width="340" height="20" fill="#3e2a1d"/>
  <text x="200" y="130" font-family="serif" font-weight="bold" font-size="44" text-anchor="middle" fill="#e8d5b7" letter-spacing="2">GENERAL</text>
  <text x="200" y="170" font-family="serif" font-weight="bold" font-size="34" text-anchor="middle" fill="#e8d5b7" letter-spacing="4">STORE</text>
  
  <!-- Main building body -->
  <rect x="50" y="200" width="300" height="400" fill="url(#wood-planks)"/>
  
  <!-- Store Porch Roof -->
  <polygon points="30,300 370,300 350,250 50,250" fill="#8c3a3a"/>
  <rect x="30" y="300" width="340" height="15" fill="#3e2a1d"/>
  
  <!-- Porch Posts -->
  <rect x="50" y="315" width="15" height="285" fill="#5c4033"/>
  <rect x="190" y="315" width="15" height="285" fill="#5c4033"/>
  <rect x="335" y="315" width="15" height="285" fill="#5c4033"/>
  
  <!-- Windows -->
  <rect x="80" y="350" width="80" height="100" fill="#ffd700" opacity="0.8" filter="url(#glow)"/>
  <rect x="80" y="350" width="80" height="100" fill="none" stroke="#3e2a1d" stroke-width="6"/>
  <line x1="120" y1="350" x2="120" y2="450" stroke="#3e2a1d" stroke-width="4"/>
  <line x1="80" y1="400" x2="160" y2="400" stroke="#3e2a1d" stroke-width="4"/>
  
  <!-- Door -->
  <rect x="220" y="330" width="80" height="150" fill="#3e2a1d"/>
  <rect x="230" y="340" width="60" height="140" fill="#5c4033"/>
  <circle cx="280" cy="410" r="4" fill="#1a0f08"/>
  
  <!-- Base boardwalk -->
  <polygon points="10,600 390,600 370,550 30,550" fill="url(#wood-dark)"/>
  <rect x="10" y="590" width="380" height="10" fill="#2e1d10"/>
</svg>