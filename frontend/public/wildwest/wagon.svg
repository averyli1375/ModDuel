<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Wagon Cover (Canvas) -->
  <path d="M 40,110 Q 20,20 150,20 Q 280,20 260,110 Z" fill="#e8d5b7" stroke="#c0a080" stroke-width="4"/>
  <!-- Canvas Ribs -->
  <path d="M 90,110 Q 90,30 150,20" fill="none" stroke="#c0a080" stroke-width="3"/>
  <path d="M 210,110 Q 210,30 150,20" fill="none" stroke="#c0a080" stroke-width="3"/>
  <path d="M 150,110 L 150,20" fill="none" stroke="#c0a080" stroke-width="3"/>
  
  <!-- Wagon Base (Wood) -->
  <rect x="35" y="110" width="230" height="35" fill="#6b4c3a" rx="5"/>
  <line x1="35" y1="120" x2="265" y2="120" stroke="#3e2a1d" stroke-width="2"/>
  <line x1="35" y1="130" x2="265" y2="130" stroke="#3e2a1d" stroke-width="2"/>
  
  <!-- Back Wheel -->
  <circle cx="80" cy="150" r="40" fill="none" stroke="#3e2a1d" stroke-width="7"/>
  <circle cx="80" cy="150" r="6" fill="#3e2a1d"/>
  <line x1="40" y1="150" x2="120" y2="150" stroke="#3e2a1d" stroke-width="4"/>
  <line x1="80" y1="110" x2="80" y2="190" stroke="#3e2a1d" stroke-width="4"/>
  <line x1="52" y1="122" x2="108" y2="178" stroke="#3e2a1d" stroke-width="4"/>
  <line x1="52" y1="178" x2="108" y2="122" stroke="#3e2a1d" stroke-width="4"/>
  
  <!-- Front Wheel (Smaller) -->
  <circle cx="230" cy="160" r="30" fill="none" stroke="#3e2a1d" stroke-width="6"/>
  <circle cx="230" cy="160" r="5" fill="#3e2a1d"/>
  <line x1="200" y1="160" x2="260" y2="160" stroke="#3e2a1d" stroke-width="3"/>
  <line x1="230" y1="130" x2="230" y2="190" stroke="#3e2a1d" stroke-width="3"/>
  <line x1="209" y1="139" x2="251" y2="181" stroke="#3e2a1d" stroke-width="3"/>
  <line x1="209" y1="181" x2="251" y2="139" stroke="#3e2a1d" stroke-width="3"/>
</svg>