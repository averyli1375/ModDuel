<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5a8" />
      <stop offset="35%" stop-color="#d4af37" />
      <stop offset="85%" stop-color="#b68925" />
      <stop offset="100%" stop-color="#735515" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Solid Wooden Badge Background -->
  <circle cx="128" cy="128" r="116" fill="#5c3a21" stroke="#2e1d10" stroke-width="12" filter="url(#shadow)" />
  
  <!-- Outer metallic ring -->
  <circle cx="128" cy="128" r="96" fill="none" stroke="#2e1d10" stroke-width="6" opacity="0.5"/>

  <!-- 6-Point Sheriff Star - Enlarged for better visibility when scaled down -->
  <g transform="translate(128,128) scale(1.2)" filter="url(#shadow)">
    <!-- First Triangle -->
    <polygon points="0,-75 65,37 -65,37" fill="url(#gold-grad)" stroke="#2e1d10" stroke-width="4" stroke-linejoin="round" />
    <!-- Second Triangle -->
    <polygon points="0,75 65,-37 -65,-37" fill="url(#gold-grad)" stroke="#2e1d10" stroke-width="4" stroke-linejoin="round" />
  </g>
</svg>